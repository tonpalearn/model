presets:
  article:
    description: Long-form educational or thought-leadership content
    evaluation_focus:
      - hook
      - clarity
      - structure
      - trust
      - usefulness
  social_post:
    description: Short-form social content where fast attention matters
    evaluation_focus:
      - hook
      - stopping-power
      - relatability
      - visual-fit
      - shareability
  ad_copy:
    description: Paid or promotional copy intended to drive action
    evaluation_focus:
      - hook
      - value-proposition
      - friction
      - urgency
      - CTA
  landing_page:
    description: Conversion-focused web page copy
    evaluation_focus:
      - headline
      - clarity
      - trust
      - objections
      - CTA
  script:
    description: Spoken script for video, reels, shorts, or presentation
    evaluation_focus:
      - opening
      - pacing
      - clarity
      - retention
      - spoken-naturalness
  image_brief:
    description: Brief for visual creative or static design
    evaluation_focus:
      - visual-story
      - emotion
      - hierarchy
      - audience-fit
      - brand-fit

type: object
required:
  - id
  - label
  - age_range
  - occupation
  - education
  - financial_pressure
  - communication_style
  - prior_direct_selling_experience
  - motivations
  - concerns
  - trust_threshold
  - sales_tolerance
properties:
  id:
    type: string
  label:
    type: string
  age_range:
    type: string
  occupation:
    type: string
  education:
    type: string
  family_context:
    type: string
  financial_pressure:
    type: string
    enum: [low, medium, high]
  communication_style:
    type: string
  prior_direct_selling_experience:
    type: string
    enum: [positive, neutral, negative, none]
  motivations:
    type: array
    items: { type: string }
  concerns:
    type: array
    items: { type: string }
  trust_threshold:
    type: string
    enum: [low, medium, high]
  sales_tolerance:
    type: string
    enum: [low, medium, high]
  time_availability:
    type: string
  notes:
    type: string

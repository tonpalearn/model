type: object
required:
  - trust_built
  - clarity
  - pressure_level
  - persona_fit
  - objection_handling
  - next_step_quality
  - ethical_continuation
  - should_qualify_out
properties:
  trust_built:
    type: integer
    minimum: 1
    maximum: 5
  clarity:
    type: integer
    minimum: 1
    maximum: 5
  pressure_level:
    type: integer
    minimum: 1
    maximum: 5
  persona_fit:
    type: integer
    minimum: 1
    maximum: 5
  objection_handling:
    type: integer
    minimum: 1
    maximum: 5
  next_step_quality:
    type: integer
    minimum: 1
    maximum: 5
  ethical_continuation:
    type: boolean
  should_qualify_out:
    type: boolean
  major_turning_points:
    type: array
    items: { type: string }
  phrases_that_helped:
    type: array
    items: { type: string }
  phrases_that_hurt:
    type: array
    items: { type: string }
  unresolved_risks:
    type: array
    items: { type: string }
  best_next_step:
    type: string

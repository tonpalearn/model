batch_id: batch-001
objective: >-
  Identify ethical conversation patterns that improve clarity, trust, and qualification quality
  for direct-selling / network-marketing sponsor conversations.

constraints:
  - no income exaggeration
  - no emotional manipulation
  - no social coercion
  - no hidden effort or hidden costs
  - qualify out when poor fit is detected

settings:
  target_persona_count: 18
  target_strategy_count: 6
  scenarios_min: 36
  scenarios_max: 54
  turns_per_conversation:
    min: 8
    max: 12

scoring_dimensions:
  - trust_built
  - clarity
  - pressure_level
  - persona_fit
  - objection_handling
  - next_step_quality
  - ethical_continuation

required_outputs:
  - scenario.json
  - transcript.md
  - evaluation.json
  - safety_review.json
  - scenario_summary.md

report_outputs:
  - reports/batch-001-report.md
  - reports/final-report.md
